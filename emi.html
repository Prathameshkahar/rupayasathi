<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupaya Saathi - Smart Financial Tools & Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8221776938467843"
     crossorigin="anonymous"></script>
    <meta name="description" content="Use financial calculators, read expert blogs, and plan your money smarter with Rupaya Saathi.">
    <meta name="keywords" content="SIP calculator, EMI calculator, finance India, tax saving, investment tools">
    <meta name="author" content="Rupaya Saathi">
    <meta property="og:title" content="Rupaya Saathi">
    <meta property="og:description" content="Smart financial calculators and insights for Indians.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://yourdomain.com/emi">
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a class="logo" href="/">Rupaya Saathi</a>
            <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a class="active" href="calculators">Calculators</a></li>
                                <li><a href="blogs">Blogs/News</a></li>
                <li><a href="contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-main">
        <section class="container card calculator-wrapper">
            <h1>EMI Calculator</h1>
            <p class="section-intro">Estimate monthly EMI, total interest, and repayment amount in seconds.</p>

            <div class="field-group">
                <label for="loanAmount">Loan Amount</label>
                <div class="input-wrapper">
                    <span class="input-prefix">₹</span>
                    <input type="number" id="loanAmount" placeholder="e.g. 500000" min="1">
                </div>
            </div>

            <div class="field-group">
                <label for="interestRate">Annual Interest Rate (%)</label>
                <input type="number" id="interestRate" placeholder="e.g. 8.5" min="0" step="0.01">
            </div>

            <div class="field-group">
                <label for="loanTenure">Loan Tenure (years)</label>
                <input type="number" id="loanTenure" placeholder="e.g. 10" min="1" step="1">
            </div>

            <button type="button" class="btn btn-primary full-width" id="calculateEmiBtn">Calculate EMI</button>
            <button type="button" class="btn btn-secondary full-width" id="downloadEmiReportBtn" disabled>Download EMI Report (PDF)</button>

            <div class="result-card" id="emiResult" aria-live="polite">Enter values and click calculate.</div>
        </section>
    </main>

    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="emi.js" defer></script>
</body>
</html>
