<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupaya Saathi | EMI Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a class="logo" href="index.html">Rupaya Saathi</a>
            <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a class="active" href="emi.html">EMI Calculator</a></li>
                <li><a href="sip.html">SIP Calculator</a></li>
                <li><a href="blogs.html">Blogs/News</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-main">
        <section class="container card calculator-wrapper">
            <h1>EMI Calculator</h1>
            <p class="section-intro">Estimate monthly EMI, total interest, and repayment amount in seconds.</p>

            <div class="field-group">
                <label for="loanAmount">Loan Amount</label>
                <div class="input-wrapper">
                    <span class="input-prefix">₹</span>
                    <input type="number" id="loanAmount" placeholder="e.g. 500000" min="1">
                </div>
            </div>

            <div class="field-group">
                <label for="interestRate">Annual Interest Rate (%)</label>
                <input type="number" id="interestRate" placeholder="e.g. 8.5" min="0" step="0.01">
            </div>

            <div class="field-group">
                <label for="loanTenure">Loan Tenure (years)</label>
                <input type="number" id="loanTenure" placeholder="e.g. 10" min="1" step="1">
            </div>

            <button type="button" class="btn btn-primary full-width" id="calculateEmiBtn">Calculate EMI</button>
            <button type="button" class="btn btn-secondary full-width" id="downloadEmiReportBtn" disabled>Download EMI Report (PDF)</button>

            <div class="result-card" id="emiResult" aria-live="polite">Enter values and click calculate.</div>
        </section>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="emi.js"></script>
</body>
</html>
