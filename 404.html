    <meta property="og:type" content="website">
    <link rel="canonical" href="https://yourdomain.com/404">
    <script>
        (function () {
            const path = window.location.pathname;
            if (path === "/404" || path === "/404.html") return;
            if (/\.[a-zA-Z0-9]+$/.test(path)) return;
            const target = path.endsWith("/") ? `${path}index.html` : `${path}.html`;
            window.location.replace(`${target}${window.location.search}${window.location.hash}`);
        })();
    </script>
</head>
<body>
    <main style="font-family:Arial,sans-serif;padding:40px;text-align:center;">
        <h1>Redirecting…</h1>

    </main>
</body>
