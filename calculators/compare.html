<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupaya Saathi | Compare Calculators</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="compare.css">
</head>
<body>
<header class="site-header">
    <nav class="navbar container">
        <a class="logo" href="../index.html">Rupaya Saathi</a>
        <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a class="active" href="../calculators.html">Calculators</a></li>
            <li><a href="../ai-assistance.html">AI Help</a></li>
            <li><a href="../blogs.html">Blogs</a></li>
            <li><a href="../contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main class="page-main">
    <section class="container compare-page">
        <a class="compare-breadcrumb" href="../calculators.html">Calculators → Compare Calculators</a>
        <h1>Compare Financial Calculators</h1>
        <p class="section-intro">Compare two financial calculators to understand which option suits your financial goals.</p>

        <section class="card compare-selectors">
            <div class="field-group">
                <label for="calculatorASelect">Select Calculator A</label>
                <select id="calculatorASelect"></select>
            </div>
            <div class="field-group">
                <label for="calculatorBSelect">Select Calculator B</label>
                <select id="calculatorBSelect"></select>
            </div>
        </section>

        <section id="comparisonResults" class="compare-results" hidden>
            <div class="compare-columns">
                <article class="card" id="panelA"></article>
                <article class="card" id="panelB"></article>
            </div>
            <article class="card compare-chart-card">
                <h2>Visual Comparison</h2>
                <div class="chart-container">
                    <canvas id="comparisonChart" aria-label="Calculator comparison chart"></canvas>
                </div>
            </article>
        </section>
    </section>
</main>

<script src="../script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="compare.js"></script>
</body>
</html>
