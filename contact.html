<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8221776938467843"
     crossorigin="anonymous"></script>
    <meta name="description" content="Use financial calculators, read expert blogs, and plan your money smarter with Rupaya Saathi.">
    <meta name="keywords" content="SIP calculator, EMI calculator, finance India, tax saving, investment tools">
    <meta name="author" content="Rupaya Saathi">
    <meta property="og:title" content="Rupaya Saathi">
    <meta property="og:description" content="Smart financial calculators and insights for Indians.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://yourdomain.com/contact">
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a class="logo" href="/">Rupaya Saathi</a>
            <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="calculators">Calculators</a></li>
                                                <li><a href="blogs">Blogs</a></li>
                <li><a class="active" href="contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-main">
        <section class="container card contact-card">
            <h1>Contact Us</h1>
            <p class="section-intro">Have a question or suggestion? Send us a message and we will get back to you soon.</p>
            <p class="support-mail">Support email: <a href="mailto:connect.apcompany@gmail.com">connect.apcompany@gmail.com</a></p>

            <form id="contactForm" action="mailto:connect.apcompany@gmail.com" method="post" enctype="text/plain" novalidate>
                <div class="field-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="field-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary full-width">Submit</button>
                <p id="formMessage" class="form-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
