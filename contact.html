<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupaya Saathi | Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a class="logo" href="index.html">Rupaya Saathi</a>
            <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="emi.html">EMI Calculator</a></li>
                <li><a href="sip.html">SIP Calculator</a></li>
                <li><a href="blogs.html">Blogs/News</a></li>
                <li><a class="active" href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-main">
        <section class="container card contact-card">
            <h1>Contact Us</h1>
            <p class="section-intro">Have a question or suggestion? Send us a message and we will get back to you soon.</p>
            <p class="support-mail">Support email: <a href="mailto:support@rupayasathi.in">support@rupayasathi.in</a></p>

            <form id="contactForm" novalidate>
                <div class="field-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="field-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary full-width">Submit</button>
                <p id="formMessage" class="form-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
