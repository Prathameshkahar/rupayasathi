<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Calculator Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="calculator-card">
            <p class="eyebrow">Smart Finance Tool</p>
            <h1>EMI Calculator</h1>
            <p class="subtitle">Quickly estimate your monthly payment and plan your budget with confidence.</p>

            <div class="field-group">
                <label for="loanAmount">Loan Amount</label>
                <div class="input-wrapper">
                    <span class="input-prefix">₹</span>
                    <input type="number" id="loanAmount" placeholder="e.g. 500000" min="1">
                </div>
            </div>

            <div class="field-group">
                <label for="interestRate">Interest Rate <span>(% per year)</span></label>
                <div class="input-wrapper">
                    <input type="number" id="interestRate" placeholder="e.g. 8.5" min="0" step="0.01">
                </div>
            </div>

            <div class="field-group">
                <label for="loanTenure">Loan Tenure <span>(years)</span></label>
                <div class="input-wrapper">
                    <input type="number" id="loanTenure" placeholder="e.g. 10" min="1" step="1">
                </div>
            </div>

            <button type="button" onclick="calculateEMI()">Calculate Monthly EMI</button>

            <div class="result-card" id="result" aria-live="polite">Enter values and click calculate.</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
