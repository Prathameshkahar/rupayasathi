<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupaya Saathi | SIP Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8221776938467843"
     crossorigin="anonymous"></script>
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a class="logo" href="index.html">Rupaya Saathi</a>
            <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a class="active" href="calculators.html">Calculators</a></li>
                                <li><a href="blogs.html">Blogs/News</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-main">
        <section class="container card calculator-wrapper">
            <h1>SIP Calculator</h1>
            <p class="section-intro">Plan your monthly investments and understand your expected maturity amount.</p>

            <div class="field-group">
                <label for="monthlyInvestment">Monthly Investment</label>
                <div class="input-wrapper">
                    <span class="input-prefix">₹</span>
                    <input type="number" id="monthlyInvestment" placeholder="e.g. 5000" min="1">
                </div>
            </div>

            <div class="field-group">
                <label for="expectedReturnRate">Expected Annual Return (%)</label>
                <input type="number" id="expectedReturnRate" placeholder="e.g. 12" min="0" step="0.01">
            </div>

            <div class="field-group">
                <label for="investmentDuration">Investment Duration (years)</label>
                <input type="number" id="investmentDuration" placeholder="e.g. 15" min="1" step="1">
            </div>

            <button type="button" class="btn btn-primary full-width" id="calculateSipBtn">Calculate SIP</button>
            <button type="button" class="btn btn-secondary full-width" id="downloadSipReportBtn" disabled>Download SIP Report (PDF)</button>

            <div class="result-card" id="sipResult" aria-live="polite">Enter values and click calculate.</div>
        </section>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="sip.js"></script>
</body>
</html>
