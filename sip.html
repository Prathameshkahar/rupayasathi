<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator | Finance Calculator Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="calculator-card">
            <div class="top-nav">
                <a href="index.html">← Home</a>
                <a href="emi.html">Go to EMI Calculator →</a>
            </div>

            <p class="eyebrow">Investment Planning</p>
            <h1>SIP Calculator</h1>
            <p class="subtitle">Estimate SIP maturity amount using monthly investment, expected annual return, and duration.</p>

            <div class="field-group">
                <label for="monthlyInvestment">Monthly Investment</label>
                <div class="input-wrapper">
                    <span class="input-prefix">₹</span>
                    <input type="number" id="monthlyInvestment" placeholder="e.g. 5000" min="1">
                </div>
            </div>

            <div class="field-group">
                <label for="expectedReturnRate">Expected Annual Return Rate <span>(%)</span></label>
                <div class="input-wrapper">
                    <input type="number" id="expectedReturnRate" placeholder="e.g. 12" min="0" step="0.01">
                </div>
            </div>

            <div class="field-group">
                <label for="investmentDuration">Investment Duration <span>(years)</span></label>
                <div class="input-wrapper">
                    <input type="number" id="investmentDuration" placeholder="e.g. 15" min="1" step="1">
                </div>
            </div>

            <button type="button" id="calculateSipBtn">Calculate SIP Maturity</button>

            <div class="result-card" id="sipResult" aria-live="polite">
                Enter all SIP values and click calculate.
            </div>
        </section>
    </main>

    <script src="sip.js"></script>
</body>
</html>
